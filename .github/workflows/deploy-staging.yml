name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install & Build
        run: |
          composer install --optimize-autoloader --no-dev --no-interaction
          npm ci
          npm run build

      - name: Prepare deploy artifact
        run: |
          tar czf deploy.tar.gz \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.github' \
            --exclude='tests' \
            --exclude='docs' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='.env.staging.example' \
            --exclude='.env.production.example' \
            --exclude='deploy.tar.gz' \
            .

      - name: Upload to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: "deploy.tar.gz"
          target: "${{ secrets.HOSTINGER_STAGING_PATH }}/deploy.tar.gz"

      - name: Extract and deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            set -e

            DEPLOY_DIR="${{ secrets.HOSTINGER_STAGING_PATH }}"

            # Preserve .env
            cp "$DEPLOY_DIR/.env" /tmp/staging_env_backup 2>/dev/null || true

            # Extract
            cd "$DEPLOY_DIR"
            tar xzf deploy.tar.gz --overwrite
            rm -f deploy.tar.gz

            # Restore .env
            cp /tmp/staging_env_backup "$DEPLOY_DIR/.env" 2>/dev/null || true

            # Install dependencies
            composer install --optimize-autoloader --no-dev --no-interaction

            # Migrations
            php artisan migrate --force

            # Cache
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link --force || true

            # Permissions
            chmod -R 755 storage/ bootstrap/cache/

            echo "=== Staging deploy complete ==="
