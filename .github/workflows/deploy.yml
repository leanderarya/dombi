name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Hostinger production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            set -e

            DEPLOY_DIR="${{ secrets.HOSTINGER_PRODUCTION_PATH }}"
            BACKUP_DIR="/home/${{ secrets.HOSTINGER_USERNAME }}/backups/prod_$(date +%Y%m%d_%H%M%S)"

            # Backup .env
            mkdir -p "$BACKUP_DIR"
            cp "$DEPLOY_DIR/.env" "$BACKUP_DIR/.env" 2>/dev/null || true

            # Maintenance mode
            cd "$DEPLOY_DIR" && php artisan down 2>/dev/null || true

            # Pull latest code
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            # Restore .env
            cp "$BACKUP_DIR/.env" "$DEPLOY_DIR/.env" 2>/dev/null || true

            # Install dependencies
            composer install --optimize-autoloader --no-dev --no-interaction

            # Database migrations
            php artisan migrate --force

            # Cache optimization
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Storage link
            ln -sf storage/app/public public/storage

            # Permissions
            chmod -R 755 storage/ bootstrap/cache/

            # Disable maintenance mode
            php artisan up

            echo "=== Production deploy complete ==="
